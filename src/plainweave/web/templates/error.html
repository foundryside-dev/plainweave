{% extends "base.html" %}
{% block title %}Error · Plainweave{% endblock %}
{% block main %}
<div class="error-page">
  <h1>Something went wrong</h1>
  <p class="error-code">{{ code }}</p>
  <p>{{ message }}</p>
  {% if hint %}<p class="error-hint">{{ hint }}</p>{% endif %}
  <p><a class="btn btn--secondary" href="/">Back to corpus</a></p>
</div>
{% endblock %}
